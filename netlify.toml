[build]
  command   = "npm install -g pnpm && pnpm install --frozen-lockfile && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/portfolio run build"
  publish   = "artifacts/portfolio/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT         = "3000"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
